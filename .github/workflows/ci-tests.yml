name: CI tests

on:
  pull_request:
  push:
    branches:
      - main

env:
  GO_VERSION: "1.25"

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.PROBE_APP_ID }}
          private-key: ${{ secrets.PROBE_APP_PRIVATE_KEY }}
          owner: TykTechnologies

      - name: use gh token
        env:
          TOKEN: "${{ steps.app-token.outputs.token }}"
        run: >
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: "Checkout code on PR"
        if: github.event_name == 'pull_request'
        uses: TykTechnologies/github-actions/.github/actions/checkout-pr@main
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: "Checkout code on push"
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        timeout-minutes: 20
        with:
          version: v2.5.0
          only-new-issues: ${{ github.event_name == 'pull_request' }}
          # Output formats configured in .golangci.yml (v2 approach)
          # Generates: text to stdout + checkstyle JSON for SonarQube
          args: --issues-exit-code=0 -v ./...
          skip-cache: false
          skip-save-cache: false
      - uses: actions/upload-artifact@v4
        with:
          name: golangcilint-${{ github.run_id }}-${{ matrix.storagetype }}-${{ matrix.database }}-${{ matrix.version }}
          retention-days: 1
          path: golanglint.xml

  test:
    name: Tests ${{ matrix.storagetype }} storage - DB ${{ matrix.database }} ${{ matrix.version }} ${{ matrix.instancetype }}
    needs: [golangci-lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - storagetype: persistent
            database: mongo
            version: 4.4
          - storagetype: persistent
            database: mongo
            version: 4.2
          - storagetype: persistent
            database: mongo
            version: 7.0
          - storagetype: persistent
            database: mongo
            version: 6.0
          - storagetype: persistent
            database: postgres
            version: 16.10
          - storagetype: persistent
            database: postgres
            version: 15.0
          - storagetype: persistent
            database: postgres
            version: 14.11
          - storagetype: persistent
            database: postgres
            version: 13.3
          - storagetype: persistent
            database: postgres
            version: 12.22
          - storagetype: temporal
            database: redis
            version: 6.0.0
            instancetype: single
          - storagetype: temporal
            database: redis
            version: 7.0.0
            instancetype: single
          - storagetype: temporal
            database: redis
            version: 6.0.0
            instancetype: cluster
          - storagetype: temporal
            database: redis
            version: 7.0.0
            instancetype: cluster
          - storagetype: temporal
            database: redis
            version: 7.2.0
            instancetype: single
          - storagetype: temporal
            database: redis
            version: 7.0.0
            instancetype: TLS

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.PROBE_APP_ID }}
          private-key: ${{ secrets.PROBE_APP_PRIVATE_KEY }}
          owner: TykTechnologies

      - name: "Checkout PR"
        if: github.event_name == 'pull_request'
        uses: TykTechnologies/github-actions/.github/actions/checkout-pr@main
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: "Checkout code"
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}
          submodules: false

      - name: Setup Golang
        uses: actions/setup-go@v3
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Install Task
        uses: arduino/setup-task@v1
        with:
          version: 3

      - if: ${{ matrix.database == 'mongo' }}
        name: Start MongoDB '${{ matrix.version }}'
        run: task -t bin/Taskfile-db.yml start-mongo MONGO_VERSION=${{ matrix.version }}

      - if: ${{ matrix.database == 'postgres' }}
        name: Start PostgresDB '${{ matrix.version }}'
        run: task -t bin/Taskfile-db.yml start-postgres POSTGRES_VERSION=${{ matrix.version }}

      - if: ${{ matrix.database == 'redis' }}
        name: Start Redis '${{ matrix.version }}'
        run: task -t bin/Taskfile-db.yml start-redis-${{matrix.instancetype}} REDIS_VERSION=${{ matrix.version }}

      - name: Run tests
        env:
          DB: ${{ matrix.database }}
          DB_SETUP: ${{ matrix.instancetype }}
          DB_VERSION: ${{ matrix.version }}
        run: task test-${{ matrix.storagetype }}
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}-${{ matrix.storagetype }}-${{ matrix.instancetype }}-${{ matrix.database }}-${{ matrix.version }}.cov
          retention-days: 1
          path: coverage/

  sonar-cloud-analysis:
    runs-on: ubuntu-latest
    needs: [test, golangci-lint]
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.PROBE_APP_ID }}
          private-key: ${{ secrets.PROBE_APP_PRIVATE_KEY }}
          owner: TykTechnologies

      - name: "Checkout PR"
        if: github.event_name == 'pull_request'
        uses: TykTechnologies/github-actions/.github/actions/checkout-pr@main
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: "Checkout code"
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Golang
        uses: actions/setup-go@v3
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-coverage
          merge-multiple: true
      - name: Download golangci-lint artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
          pattern: golangcilint-*
          merge-multiple: true
      - name: Check reports existence
        id: check_files
        uses: andstor/file-existence-action@v1
        with:
          files: "coverage/*.cov, golanglint.xml"
      - name: Install Dependencies
        env:
          TOKEN: "${{ steps.app-token.outputs.token }}"
        run: >
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

          go install github.com/wadey/gocovmerge@latest
      - name: Setup CI Tooling
        uses: shrink/actions-docker-extract@v3
        with:
          image: tykio/ci-tools:latest
          path: /usr/local/bin/task
          destination: /usr/local/bin/

      - name: merge reports
        run: task merge-coverage
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.organization=tyktechnologies
            -Dsonar.projectKey=TykTechnologies_storage
            -Dsonar.sources=.
            -Dsonar.coverage.exclusions=**/*_test.go,**/mocks/*.go,**/tempmocks/*.go
            -Dsonar.exclusions=**/mocks/*.go,**/tempmocks/*.go
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.tests=.
            -Dsonar.go.coverage.reportPaths=merged-coverage.cov
            -Dsonar.go.golangci-lint.reportPaths=golanglint.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
