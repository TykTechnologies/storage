name: CI tests

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - main

env:
  GO_VERSION: "1.24"

jobs:
  dep-guard:
    uses: TykTechnologies/github-actions/.github/workflows/dependency-guard.yml@d3fa20888fa2878e877e22bb7702141217290e7c  # main
    permissions:
      contents: read

  golangci-lint:
    needs: [dep-guard]
    runs-on: ubuntu-latest
    steps:
      - name: use gh token
        env:
          TOKEN: "${{ secrets.ORG_GH_TOKEN }}"
        run: >
          git config --global url."https://${TOKEN}@github.com".insteadOf "https://github.com"
      - name: "Checkout code on PR"
        if: github.event_name == 'pull_request'
        uses: TykTechnologies/github-actions/.github/actions/checkout-pr@d3fa20888fa2878e877e22bb7702141217290e7c  # main
        with:
          token: ${{ secrets.ORG_GH_TOKEN }}

      - name: "Checkout code on push"
        if: github.event_name == 'push'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ secrets.ORG_GH_TOKEN }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9  # v8
        timeout-minutes: 20
        with:
          version: v2.5.0
          only-new-issues: ${{ github.event_name == 'pull_request' }}
          # Output formats configured in .golangci.yml (v2 approach)
          # Generates: text to stdout + checkstyle JSON for SonarQube
          args: --issues-exit-code=0 -v ./...
          skip-cache: false
          skip-save-cache: false
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: golangcilint-${{ github.run_id }}-${{ matrix.storagetype }}-${{ matrix.database }}-${{ matrix.version }}
          retention-days: 1
          path: golanglint.xml

  test:
    name: Tests ${{ matrix.storagetype }} storage - DB ${{ matrix.database }} ${{ matrix.version }} ${{ matrix.instancetype }}
    needs: [dep-guard, golangci-lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - storagetype: persistent
            database: mongo
            version: 4.4
          - storagetype: persistent
            database: mongo
            version: 4.2
          - storagetype: persistent
            database: mongo
            version: 7.0
          - storagetype: persistent
            database: mongo
            version: 6.0
          - storagetype: persistent
            database: postgres
            version: 16.10
          - storagetype: persistent
            database: postgres
            version: 15.0
          - storagetype: persistent
            database: postgres
            version: 14.11
          - storagetype: persistent
            database: postgres
            version: 13.3
          - storagetype: persistent
            database: postgres
            version: 12.22
          - storagetype: temporal
            database: redis
            version: 6.0.0
            instancetype: single
          - storagetype: temporal
            database: redis
            version: 7.0.0
            instancetype: single
          - storagetype: temporal
            database: redis
            version: 6.0.0
            instancetype: cluster
          - storagetype: temporal
            database: redis
            version: 7.0.0
            instancetype: cluster
          - storagetype: temporal
            database: redis
            version: 7.2.0
            instancetype: single
          - storagetype: temporal
            database: redis
            version: 7.0.0
            instancetype: TLS

    steps:
      - name: "Checkout PR"
        if: github.event_name == 'pull_request'
        uses: TykTechnologies/github-actions/.github/actions/checkout-pr@d3fa20888fa2878e877e22bb7702141217290e7c  # main
        with:
          token: ${{ secrets.ORG_GH_TOKEN }}

      - name: "Checkout code"
        if: github.event_name == 'push'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1
          token: ${{ secrets.ORG_GH_TOKEN }}
          submodules: false

      - name: Setup Golang
        uses: actions/setup-go@be3c94b385c4f180051c996d336f57a34c397495  # v3
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Install Task
        uses: arduino/setup-task@e26d8975574116b0097a1161e0fe16ba75d84c1c  # v1
        with:
          version: 3

      - if: ${{ matrix.database == 'mongo' }}
        name: Start MongoDB '${{ matrix.version }}'
        run: task -t bin/Taskfile-db.yml start-mongo MONGO_VERSION=${{ matrix.version }}

      - if: ${{ matrix.database == 'postgres' }}
        name: Start PostgresDB '${{ matrix.version }}'
        run: task -t bin/Taskfile-db.yml start-postgres POSTGRES_VERSION=${{ matrix.version }}

      - if: ${{ matrix.database == 'redis' }}
        name: Start Redis '${{ matrix.version }}'
        run: task -t bin/Taskfile-db.yml start-redis-${{matrix.instancetype}} REDIS_VERSION=${{ matrix.version }}

      - name: Run tests
        env:
          DB: ${{ matrix.database }}
          DB_SETUP: ${{ matrix.instancetype }}
          DB_VERSION: ${{ matrix.version }}
        run: task test-${{ matrix.storagetype }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-${{ github.run_id }}-${{ matrix.storagetype }}-${{ matrix.instancetype }}-${{ matrix.database }}-${{ matrix.version }}.cov
          retention-days: 1
          path: coverage/

  sonar-cloud-analysis:
    runs-on: ubuntu-latest
    needs: [dep-guard, test, golangci-lint]
    steps:
      - name: "Checkout PR"
        if: github.event_name == 'pull_request'
        uses: TykTechnologies/github-actions/.github/actions/checkout-pr@d3fa20888fa2878e877e22bb7702141217290e7c  # main
        with:
          token: ${{ secrets.ORG_GH_TOKEN }}

      - name: "Checkout code"
        if: github.event_name == 'push'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1
          token: ${{ secrets.ORG_GH_TOKEN }}

      - name: Setup Golang
        uses: actions/setup-go@be3c94b385c4f180051c996d336f57a34c397495  # v3
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Download coverage artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: ./downloaded-coverage
          merge-multiple: true
      - name: Download golangci-lint artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: .
          pattern: golangcilint-*
          merge-multiple: true
      - name: Check reports existence
        id: check_files
        uses: andstor/file-existence-action@f02338908d150e00a4b8bebc2dad18bd9e5229b0  # v1
        with:
          files: "coverage/*.cov, golanglint.xml"
      - name: Install Dependencies
        env:
          TOKEN: "${{ secrets.ORG_GH_TOKEN }}"
        run: >
          git config --global url."https://${TOKEN}@github.com".insteadOf "https://github.com"

          go install github.com/wadey/gocovmerge@b5bfa59ec0adc420475f97f89b58045c721d761c
      - name: Setup CI Tooling
        uses: shrink/actions-docker-extract@921bf17c6693530407a79458546c735d712a3216  # v3
        with:
          image: tykio/ci-tools:latest  # TODO: pin to digest once available
          path: /usr/local/bin/task
          destination: /usr/local/bin/

      - name: merge reports
        run: task merge-coverage
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e  # master
        with:
          args: >
            -Dsonar.organization=tyktechnologies
            -Dsonar.projectKey=TykTechnologies_storage
            -Dsonar.sources=.
            -Dsonar.coverage.exclusions=**/*_test.go,**/mocks/*.go,**/tempmocks/*.go
            -Dsonar.exclusions=**/mocks/*.go,**/tempmocks/*.go
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.tests=.
            -Dsonar.go.coverage.reportPaths=merged-coverage.cov
            -Dsonar.go.golangci-lint.reportPaths=golanglint.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
